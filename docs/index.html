<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070810">
<title>Artist OS — Web Preview</title>
<style>
:root{
  --bg:#070810; --panel:#11121A; --raised:#171A22; --line:rgba(255,255,255,.09);
  --text:#F2F6FC; --muted:#8F96A8; --gold:#D6AE5C; --gold-bright:#F2D083;
  --green:#7AD685; --blue:#80A6FF; --red:#E8788A;
  --r:16px; --tabbar-h:58px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font:15px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
  overscroll-behavior:none;
}
.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}
::-webkit-scrollbar{display:none}

/* ---------- shell ---------- */
#app{display:flex;flex-direction:column;height:100dvh}
header.top{
  padding:calc(10px + var(--sat)) 16px 10px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--line);
  background:rgba(7,8,16,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  position:sticky;top:0;z-index:20;
}
.brand{font-weight:900;letter-spacing:-.03em;font-size:17px}
.brand .os{color:var(--gold)}
.env-pill{
  margin-left:auto;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:4px 9px;white-space:nowrap
}
#back{display:none;font-size:15px;font-weight:700;color:var(--gold);padding:4px 6px 4px 0}
#back.show{display:block}

main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(24px + var(--tabbar-h) + var(--sab))}
main.has-np{padding-bottom:calc(24px + var(--tabbar-h) + 62px + var(--sab))}

/* ---------- shared components ---------- */
.eyebrow{font-size:10.5px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.panel{background:rgba(17,18,26,.86);border:1px solid var(--line);border-radius:var(--r)}
.card{display:block;width:100%;text-align:left;padding:14px;margin-bottom:10px;transition:border-color .15s,background .15s}
@media(hover:hover){.card:hover{background:var(--raised);border-color:rgba(255,255,255,.18)}}
.card:active{background:var(--raised)}
.badge{
  display:inline-flex;align-items:center;font-size:10.5px;font-weight:800;letter-spacing:.02em;
  padding:4px 9px;border-radius:999px;white-space:nowrap;
  color:var(--tint,var(--gold));background:color-mix(in srgb,var(--tint,var(--gold)) 13%,transparent);
  border:1px solid color-mix(in srgb,var(--tint,var(--gold)) 26%,transparent)
}
.bar{height:6px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-bright));transition:width .4s cubic-bezier(.3,1.3,.4,1)}
.row-title{font-weight:800;font-size:15.5px}
.sub{font-size:12px;color:var(--muted)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  font-weight:800;font-size:13.5px;border-radius:12px;padding:11px 16px;min-height:44px;
  border:1px solid var(--line);background:var(--raised);transition:transform .08s
}
.btn:active{transform:scale(.97)}
.btn.gold{background:var(--gold);color:#14100a;border-color:transparent}
.btn.blue{background:var(--blue);color:#0a1020;border-color:transparent}
.btn.ghost{background:transparent}
.btn.danger{color:var(--red)}
.play{
  width:40px;height:40px;min-width:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--gold) 14%,transparent);color:var(--gold);font-size:15px
}
.play.off{color:var(--muted);background:rgba(255,255,255,.05)}
canvas.wave{width:100%;height:34px;display:block;border-radius:6px}

/* ---------- songs ---------- */
.watch-card{padding:13px 14px;margin-bottom:14px;display:flex;align-items:center;gap:11px}
.watch-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.watch-card .grow{flex:1;min-width:0}
.watch-card .btn{min-height:38px;padding:8px 12px;font-size:12.5px}

/* ---------- song workspace ---------- */
.song-hero{margin:4px 0 16px}
.song-hero h1{font-size:34px;font-weight:900;letter-spacing:-.045em;line-height:1.05}
.hero-row{display:flex;align-items:flex-start;gap:14px}
.hero-row .grow{flex:1;min-width:0}
.ring{width:62px;height:62px;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
.segs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;margin:14px 0 16px;width:max-content}
.segs button{padding:8px 16px;border-radius:9px;font-weight:800;font-size:13px;color:var(--muted);min-height:38px}
.segs button.on{background:var(--raised);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.06) inset}
.slot{padding:13px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
.slot .idx{
  width:38px;height:38px;min-width:38px;border-radius:11px;background:rgba(255,255,255,.045);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--muted)
}
.slot .meta{flex:1;min-width:0}
.slot .meta .nm{font-weight:900;font-size:14.5px}
.slot .meta .asset{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.slot .right{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.slot .conf{width:64px}
.slot.decide{border-color:color-mix(in srgb,var(--gold) 40%,transparent)}
.add-slot{width:100%;justify-content:center;margin-top:2px;color:var(--muted)}

/* ---------- events ---------- */
.evt{padding:13px;margin-bottom:9px;display:flex;gap:12px;animation:slidein .35s cubic-bezier(.2,1,.3,1)}
@keyframes slidein{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:none}}
.evt .when{min-width:56px;font-size:11px;font-weight:800;color:var(--muted);padding-top:2px}
.evt .body{flex:1;min-width:0}
.evt .ops{font-weight:900;font-size:13.5px}
.evt .ops .op{color:var(--gold)}
.evt .sum{font-size:12.5px;color:var(--muted);margin-top:3px}
.evt .who{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);align-self:flex-start;padding-top:3px}
.evt .who.obs{color:var(--green)}

/* ---------- assets grid ---------- */
.asset-card{padding:13px;margin-bottom:10px}
.asset-card .hd{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.asset-card .hd .grow{flex:1;min-width:0}
.asset-card .file{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:8px}
.tagrow{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.eq{display:inline-flex;gap:2px;align-items:flex-end;height:12px;margin-left:6px}
.eq i{width:3px;background:var(--gold);border-radius:2px;animation:eq .7s infinite ease-in-out}
.eq i:nth-child(2){animation-delay:.2s}.eq i:nth-child(3){animation-delay:.4s}
@keyframes eq{0%,100%{height:4px}50%{height:12px}}

/* ---------- now playing ---------- */
#np{
  position:fixed;left:0;right:0;bottom:calc(var(--tabbar-h) + var(--sab));z-index:30;
  display:none;align-items:center;gap:11px;padding:10px 14px;
  background:rgba(13,14,22,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--line)
}
#np.show{display:flex}
#np .ttl{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#np .ssub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#np .info{width:34%;min-width:0}
#np .track{flex:1;height:22px;display:flex;align-items:center}
#np .track .bar{flex:1}
#np time{font-size:11px;font-weight:700;color:var(--muted);min-width:34px;text-align:center}

/* ---------- tab bar ---------- */
nav#tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:30;height:calc(var(--tabbar-h) + var(--sab));
  padding-bottom:var(--sab);display:flex;
  background:rgba(10,11,18,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--line)
}
nav#tabs button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.04em}
nav#tabs button .ic{font-size:19px;line-height:1}
nav#tabs button.on{color:var(--gold)}

/* ---------- sheets / modal ---------- */
#scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
#scrim.show{opacity:1;pointer-events:auto}
#sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:41;max-height:82dvh;overflow-y:auto;
  background:#0E0F17;border:1px solid var(--line);border-bottom:0;border-radius:20px 20px 0 0;
  padding:14px 16px calc(20px + var(--sab));transform:translateY(102%);transition:transform .26s cubic-bezier(.2,1,.3,1)
}
#sheet.show{transform:none}
#sheet .grab{width:38px;height:4px;border-radius:99px;background:rgba(255,255,255,.18);margin:0 auto 14px}
#sheet h3{font-size:17px;font-weight:900;letter-spacing:-.02em;margin-bottom:2px}
#sheet .hint{font-size:12px;color:var(--muted);margin-bottom:14px}
.opt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:13px 12px;border-radius:12px;font-weight:700;font-size:14.5px}
.opt:active{background:var(--raised)}
.opt .r{margin-left:auto;font-size:12px;color:var(--muted)}
.opt .dot{width:9px;height:9px;border-radius:50%;background:var(--tint,var(--muted))}
.field{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;color:var(--text);font:inherit;padding:12px;margin-bottom:10px;min-height:44px}
select.field{appearance:none;-webkit-appearance:none}
.sheet-actions{display:flex;gap:9px;margin-top:8px}
.sheet-actions .btn{flex:1}

/* A/B */
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ab{padding:12px;border-radius:14px;border:1.5px solid var(--line);background:var(--panel)}
.ab.live{border-color:var(--tint)}
.ab .lbl{font-size:19px;font-weight:900;color:var(--tint);margin-bottom:8px}
.ab select{margin-bottom:9px;font-size:12.5px;padding:9px}
.ab .btn{width:100%;margin-top:9px;min-height:40px;font-size:12.5px}
.ab .fn{font-size:10.5px;color:var(--muted);margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#toast{
  position:fixed;left:50%;bottom:calc(var(--tabbar-h) + 76px + var(--sab));transform:translate(-50%,14px);
  z-index:50;background:#1A1D28;border:1px solid var(--line);border-radius:12px;padding:11px 16px;
  font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;max-width:88vw;text-align:center
}
#toast.show{opacity:1;transform:translate(-50%,0)}
.empty{padding:44px 20px;text-align:center;color:var(--muted)}
.empty .big{font-size:30px;margin-bottom:10px}
.empty b{display:block;color:var(--text);font-size:15px;margin-bottom:4px}

/* ---------- desktop ---------- */
#desk-list{display:none}
@media(min-width:1024px){
  main{max-width:1280px;margin:0 auto;width:100%;display:grid;grid-template-columns:340px 1fr;gap:22px;align-items:start}
  #desk-list{display:block;position:sticky;top:70px}
  #view{min-width:0}
  #back{display:none!important}
  nav#tabs{left:50%;transform:translateX(-50%);max-width:520px;border:1px solid var(--line);border-radius:16px;bottom:14px;height:var(--tabbar-h);padding-bottom:0}
  #np{left:50%;transform:translateX(-50%);max-width:820px;border:1px solid var(--line);border-radius:14px;bottom:86px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <button id="back" aria-label="Back">‹ Songs</button>
    <div class="brand">ARTIST<span class="os"> OS</span></div>
    <div class="env-pill">Web preview · demo data</div>
  </header>
  <main id="main">
    <aside id="desk-list"></aside>
    <section id="view"></section>
  </main>

  <div id="np" role="region" aria-label="Now playing">
    <button class="play" id="np-play" aria-label="Play or pause">▶</button>
    <div class="info">
      <div class="ttl" id="np-title"></div>
      <div class="ssub" id="np-sub"></div>
    </div>
    <time class="mono" id="np-cur">0:00</time>
    <div class="track" id="np-track"><div class="bar"><i id="np-fill" style="width:0%"></i></div></div>
    <time class="mono" id="np-dur">0:00</time>
    <button id="np-stop" aria-label="Stop" style="color:var(--muted);font-size:17px">✕</button>
  </div>

  <nav id="tabs">
    <button data-tab="songs" class="on"><span class="ic">♪</span>Songs</button>
    <button data-tab="timeline"><span class="ic">⏱</span>Timeline</button>
    <button data-tab="assets"><span class="ic">▦</span>Assets</button>
    <button data-tab="dna"><span class="ic">〰</span>DNA</button>
  </nav>

  <div id="scrim"></div>
  <div id="sheet" role="dialog" aria-modal="true"></div>
  <div id="toast"></div>
</div>

<script>
"use strict";
/* ================= demo catalog (sanitized) ================= */
const uid = () => Math.random().toString(36).slice(2, 10);
const now = Date.now(), MIN = 6e4, HR = 36e5, DAY = 864e5;

const ROLES = { beat:"Beat", leadVocal:"Lead Vocal", hook:"Hook", bridge:"Bridge", fullMix:"Full Mix", reference:"Reference" };
const STATES = {
  locked:{ label:"Locked", tint:"var(--green)" },
  candidate:{ label:"Candidate", tint:"var(--gold)" },
  needsDecision:{ label:"Needs Decision", tint:"var(--gold)" },
  experiment:{ label:"Experiment", tint:"var(--blue)" },
  open:{ label:"Open", tint:"var(--muted)" }
};
const OPS = ["Imported","Source Selected","Candidate Added","Approved","Needs Decision","Recording Updated","Structure Updated","Archived"];
const TARGETS = ["Song","Intro","Verse","Hook","Bridge","Beat","Lead Vocal","Mix"];

function mkAsset(songId, title, file, role, dur, ageHr){
  return { id:uid(), songId, title, file, role, dur, created: now - ageHr*HR };
}
function mkSong(title, era, status){
  return { id:uid(), title, era, status, sections:[] };
}
function sec(name, role, assetId, state, conf, note=""){
  return { id:uid(), name, role, assetId, state, conf, note };
}

const S1 = mkSong("Golden State","Ascension Era","Assembling");
const S2 = mkSong("Baddest Times","Ascension Era","Mixing");
const S3 = mkSong("Night Drive","Sketches","Idea");

const A = [
  mkAsset(S1.id,"Beat is M9","beat is m9.m4a","beat",199,220),
  mkAsset(S1.id,"Soda7draft","soda7draft.m4a","leadVocal",252,190),
  mkAsset(S1.id,"Hook Take 2","golden hook take2.m4a","hook",41,52),
  mkAsset(S1.id,"Hook Late Night","hook latenite bounce.m4a","hook",44,9),
  mkAsset(S1.id,"Candid Camera","candidcamera(apple master)_1.m4a","bridge",258,300),
  mkAsset(S2.id,"Baddest Full v7","baddest times(7) mixdown.wav","fullMix",210,30),
  mkAsset(S2.id,"Baddest Vox Comp","baddest vox comp.wav","leadVocal",205,76),
  mkAsset(S3.id,"Night Drive Idea","voice memo 0412.m4a","reference",63,5)
];
const byId = id => A.find(a => a.id === id);

S1.sections = [
  sec("Intro","Atmosphere",A[0].id,"locked",.94),
  sec("Verse 1","Lead vocal",A[1].id,"candidate",.62,"Second take has better pocket on bar 9."),
  sec("Hook","Melody",A[2].id,"needsDecision",.5,"Take 2 vs late-night bounce — energy vs intimacy."),
  sec("Bridge","Alt pocket",A[4].id,"experiment",.4),
  sec("Outro","Space",null,"open",0)
];
S2.sections = [
  sec("Intro","Atmosphere",A[5].id,"locked",.9),
  sec("Verse 1","Lead vocal",A[6].id,"locked",.92),
  sec("Hook","Melody",A[5].id,"locked",.95),
  sec("Bridge","Alt pocket",A[5].id,"candidate",.55),
  sec("Outro","Space",A[5].id,"locked",.9)
];
S3.sections = [
  sec("Intro","Atmosphere",null,"open",0),
  sec("Verse 1","Lead vocal",A[7].id,"experiment",.3,"Melody sketch only."),
  sec("Hook","Melody",null,"open",0),
  sec("Outro","Space",null,"open",0)
];

const state = {
  songs:[S1,S2,S3], assets:A, events:[],
  tab:"songs", songId:null, songTab:"master", npAsset:null
};

function evt(songId, target, op, summary, ageMs, observed=false){
  state.events.unshift({ id:uid(), songId, target, op, summary, t: now - ageMs, observed });
}
evt(S1.id,"Song","Imported","Golden State imported from local folder.",12*DAY);
evt(S1.id,"Beat","Imported","beat is m9.m4a imported.",12*DAY);
evt(S1.id,"Intro","Approved","Intro moved from Candidate to Locked.",9*DAY);
evt(S1.id,"Hook","Recording Updated","golden hook take2.m4a changed on disk (observed).",2*DAY,true);
evt(S1.id,"Hook","Imported","hook latenite bounce.m4a appeared in watched folder (observed).",9*HR,true);
evt(S1.id,"Hook","Needs Decision","Hook moved from Candidate to Needs Decision.",8*HR);
evt(S2.id,"Mix","Recording Updated","baddest times(7) mixdown.wav changed on disk (observed).",30*HR,true);
evt(S2.id,"Hook","Approved","Hook moved from Candidate to Locked.",28*HR);
evt(S3.id,"Song","Imported","Night Drive detected in watched folder (observed).",5*HR,true);

/* ================= helpers ================= */
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const song = () => state.songs.find(s => s.id === state.songId);
const songOf = a => state.songs.find(s => s.id === a.songId);
const assetsFor = id => state.assets.filter(a => a.songId === id);
const mmss = t => { t = Math.max(0, Math.round(t)); return (t/60|0) + ":" + String(t%60).padStart(2,"0"); };
function ago(t){
  const d = now2() - t;
  if (d < MIN) return "now";
  if (d < HR) return (d/MIN|0) + "m ago";
  if (d < DAY) return (d/HR|0) + "h ago";
  return (d/DAY|0) + "d ago";
}
function now2(){ return Date.now(); }
function progress(s){ const n = s.sections.length; return n ? s.sections.filter(x => x.state === "locked").length / n : 0; }
function risk(s){
  const und = s.sections.filter(x => x.state === "needsDecision").map(x => x.name);
  if (und.length) return und.join(", ") + " decision unresolved";
  return progress(s) === 1 ? "Master locked" : "In assembly";
}
function record(songId, target, op, summary, observed=false){
  state.events.unshift({ id:uid(), songId, target, op, summary, t: now2(), observed });
}
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 2400);
}
/* seeded waveform peaks */
function peaks(id, n=72){
  let h = 0; for (const c of id) h = (h*31 + c.charCodeAt(0)) >>> 0;
  const out = [];
  for (let i = 0; i < n; i++){
    h = (h*1664525 + 1013904223) >>> 0;
    const r = h/2**32, env = .35 + .65*Math.sin(Math.PI*i/n);
    out.push(Math.max(.08, r*env + .22*Math.sin(i*.9)*(r>.5?1:.4)));
  }
  const m = Math.max(...out);
  return out.map(v => v/m);
}
function drawWave(canvas, asset, tint){
  const dpr = devicePixelRatio || 1, w = canvas.clientWidth, h = canvas.clientHeight;
  if (!w) return;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const g = canvas.getContext("2d"); g.scale(dpr, dpr);
  const pk = peaks(asset.id), bw = w/pk.length;
  g.fillStyle = tint || "#D6AE5C";
  pk.forEach((p, i) => {
    const bh = Math.max(2, p*h);
    g.globalAlpha = .88;
    roundRect(g, i*bw + bw*.16, (h-bh)/2, bw*.68, bh, bw*.3);
  });
}
function roundRect(g, x, y, w, h, r){
  g.beginPath();
  g.moveTo(x+r, y); g.arcTo(x+w, y, x+w, y+h, r); g.arcTo(x+w, y+h, x, y+h, r);
  g.arcTo(x, y+h, x, y, r); g.arcTo(x, y, x+w, y, r); g.closePath(); g.fill();
}

/* ================= generative preview synth ================= */
const Player = {
  ctx:null, nodes:[], timer:null, startAt:0, offset:0, playing:false,
  seedOf(a){ let h = 0; for (const c of a.id) h = (h*33 + c.charCodeAt(0)) >>> 0; return h; },
  ensure(){ if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === "suspended") this.ctx.resume(); },
  stopNodes(){ this.nodes.forEach(n => { try{ n.stop ? n.stop() : n.disconnect(); }catch(e){} }); this.nodes = []; clearInterval(this.timer); },
  play(asset, offset=0){
    this.ensure(); this.stopNodes();
    state.npAsset = asset; this.offset = Math.max(0, Math.min(offset, asset.dur - .5));
    this.startAt = this.ctx.currentTime; this.playing = true;
    const seed = this.seedOf(asset);
    const bpm = 78 + seed % 18, spb = 60/bpm;
    const roots = [110, 98, 87.3, 123.5], root = roots[seed % 4];
    const master = this.ctx.createGain(); master.gain.value = .22; master.connect(this.ctx.destination);
    const lp = this.ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 1400; lp.connect(master);
    // pad chord
    [1, 1.19, 1.5].forEach((m, i) => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = "sawtooth"; o.frequency.value = root*2*m; o.detune.value = (i-1)*7;
      g.gain.value = .05; o.connect(g); g.connect(lp); o.start();
      this.nodes.push(o, g);
    });
    // groove scheduler
    let beat = 0;
    const tick = () => {
      if (!this.playing) return;
      const t = this.ctx.currentTime + .05;
      // kick on 1 & 3
      if (beat % 2 === 0){
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.frequency.setValueAtTime(120, t); o.frequency.exponentialRampToValueAtTime(40, t+.12);
        g.gain.setValueAtTime(.5, t); g.gain.exponentialRampToValueAtTime(.001, t+.16);
        o.connect(g); g.connect(master); o.start(t); o.stop(t+.2); this.nodes.push(o);
      }
      // hat each beat
      const nb = this.ctx.createBufferSource(), buf = this.ctx.createBuffer(1, 2205, 44100);
      const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 3);
      nb.buffer = buf;
      const hp = this.ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 7000;
      const hg = this.ctx.createGain(); hg.gain.value = beat % 2 ? .12 : .07;
      nb.connect(hp); hp.connect(hg); hg.connect(master); nb.start(t); this.nodes.push(nb);
      // bass on downbeat
      if (beat % 4 === 0){
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.type = "sine"; o.frequency.value = root;
        g.gain.setValueAtTime(.28, t); g.gain.exponentialRampToValueAtTime(.001, t + spb*1.6);
        o.connect(g); g.connect(master); o.start(t); o.stop(t + spb*1.8); this.nodes.push(o);
      }
      beat++;
    };
    tick(); this.timer = setInterval(tick, spb*1000);
    renderNP(); renderView(false);
  },
  pos(){ return this.playing ? Math.min(this.offset + (this.ctx.currentTime - this.startAt), state.npAsset?.dur || 0) : this.offset; },
  pause(){ if (!this.playing) return; this.offset = this.pos(); this.playing = false; this.stopNodes(); renderNP(); renderView(false); },
  resume(){ if (state.npAsset) this.play(state.npAsset, this.offset); },
  toggle(a){
    if (state.npAsset?.id === a.id){ this.playing ? this.pause() : this.resume(); }
    else this.play(a, 0);
  },
  switchTo(a){ const p = this.pos(), was = this.playing; this.play(a, Math.min(p, a.dur - 1)); if (!was) this.pause(); },
  seek(frac){ const a = state.npAsset; if (!a) return; this.play(a, frac*a.dur); },
  stop(){ this.playing = false; this.stopNodes(); state.npAsset = null; this.offset = 0; renderNP(); renderView(false); }
};
setInterval(() => {
  if (!state.npAsset) return;
  const a = state.npAsset, p = Player.pos();
  $("#np-cur").textContent = mmss(p);
  $("#np-fill").style.width = (100*p/a.dur) + "%";
  if (Player.playing && p >= a.dur - .05) Player.stop();
}, 250);

/* ================= renderers ================= */
function stateChip(k){ const s = STATES[k]; return `<span class="badge" style="--tint:${s.tint}">${s.label}</span>`; }

function songCard(s, compact=false){
  const p = progress(s);
  return `<button class="card panel song-card" data-song="${s.id}">
    <div style="display:flex;align-items:flex-start;gap:10px">
      <div style="flex:1;min-width:0">
        <div class="row-title">${esc(s.title)}</div>
        <div class="sub" style="margin-top:2px">${esc(s.era)} · ${s.sections.length} slots · ${assetsFor(s.id).length} assets</div>
      </div>
      <span class="badge">${s.status}</span>
    </div>
    <div class="bar" style="margin-top:11px"><i style="width:${p*100}%"></i></div>
    ${compact ? "" : `<div class="sub" style="margin-top:8px">${esc(risk(s))}</div>`}
  </button>`;
}

function renderSongs(){
  return `
  <div class="watch-card panel">
    <div class="watch-dot"></div>
    <div class="grow">
      <div style="font-weight:800;font-size:13.5px">Watching ~/Music/Career</div>
      <div class="sub">New bounces auto-import · changes become events</div>
    </div>
    <button class="btn gold" id="simulate-drop">Drop a bounce</button>
  </div>
  <div class="eyebrow">Songs</div>
  ${state.songs.map(s => songCard(s)).join("")}`;
}

function scoreRing(v){
  const r = 26, c = 2*Math.PI*r;
  return `<div class="ring"><svg width="62" height="62" viewBox="0 0 62 62">
    <circle cx="31" cy="31" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/>
    <circle cx="31" cy="31" r="${r}" fill="none" stroke="var(--gold)" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${c*(1-v)}"/>
  </svg><b>${Math.round(v*100)}</b></div>`;
}

function renderSongView(){
  const s = song(); if (!s) return renderSongs();
  const p = progress(s);
  const tabs = [["master","Master"],["changes","Changes"],["assets","Assets"]];
  let body = "";
  if (state.songTab === "master") body = renderMaster(s);
  if (state.songTab === "changes") body = renderEvents(state.events.filter(e => e.songId === s.id), false);
  if (state.songTab === "assets") body = renderAssetCards(assetsFor(s.id));
  return `
  <div class="song-hero">
    <div class="eyebrow" style="color:var(--gold);margin-bottom:6px">Current Song</div>
    <div class="hero-row">
      <div class="grow">
        <h1>${esc(s.title)}</h1>
        <div class="sub" style="margin-top:6px">${esc(s.era)} · ${s.status} · ${esc(risk(s))}</div>
      </div>
      ${scoreRing(.55 + p*.4)}
    </div>
    <div class="bar" style="margin-top:14px"><i style="width:${p*100}%"></i></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div class="segs">${tabs.map(([k,l]) => `<button data-songtab="${k}" class="${state.songTab===k?"on":""}">${l}</button>`).join("")}</div>
    <button class="btn ghost" id="log-change" style="min-height:40px;color:var(--gold)">＋ Log change</button>
  </div>
  ${body}`;
}

function renderMaster(s){
  return `<div class="eyebrow">Current Master Composition</div>` +
  s.sections.map((x, i) => {
    const a = byId(x.assetId), st = STATES[x.state];
    const playing = a && state.npAsset?.id === a.id;
    return `<div class="slot panel ${x.state==="needsDecision"?"decide":""}" data-slot="${x.id}" role="button" tabindex="0">
      <div class="idx mono">${String(i+1).padStart(2,"0")}</div>
      <div class="meta">
        <div class="nm">${esc(x.name)} ${playing ? eq() : ""}</div>
        <div class="asset">${a ? esc(a.title) + " · " + esc(a.file) : (x.note ? esc(x.note) : "No asset — tap to assign")}</div>
      </div>
      ${a ? `<button class="play ${playing && Player.playing ? "" : ""}" data-play="${a.id}" aria-label="Preview">${playing && Player.playing ? "❚❚" : "▶"}</button>` : ""}
      ${x.state === "needsDecision" ? `<button class="btn gold" data-compare="${x.id}" style="min-height:38px;padding:8px 12px;font-size:12px">A/B</button>` : ""}
      <div class="right">
        ${stateChip(x.state)}
        <div class="bar conf"><i style="width:${x.conf*100}%"></i></div>
      </div>
    </div>`;
  }).join("") +
  `<button class="btn ghost add-slot" id="add-slot">＋ Add slot</button>`;
}

function eq(){ return `<span class="eq" aria-hidden="true"><i></i><i></i><i></i></span>`; }

function renderEvents(list, withSong){
  if (!list.length) return `<div class="empty"><div class="big">⏱</div><b>No creative events yet</b>Make a change and the record writes itself.</div>`;
  return `<div class="eyebrow">Creative Change Log</div>` + list.map(e => {
    const s = state.songs.find(x => x.id === e.songId);
    return `<div class="evt panel">
      <div class="when mono" title="${new Date(e.t).toLocaleString()}">${ago(e.t)}</div>
      <div class="body">
        ${withSong && s ? `<div class="sub" style="color:var(--gold);font-weight:800;font-size:11px;margin-bottom:2px">${esc(s.title)}</div>` : ""}
        <div class="ops">${esc(e.target)} <span class="op">${esc(e.op)}</span></div>
        <div class="sum">${esc(e.summary)}</div>
      </div>
      <div class="who ${e.observed ? "obs" : ""}">${e.observed ? "Observed" : "You"}</div>
    </div>`;
  }).join("");
}

function renderAssetCards(list){
  if (!list.length) return `<div class="empty"><div class="big">▦</div><b>No assets yet</b>Import a folder to attach recordings and mixes.</div>`;
  return `<div class="eyebrow">Assets</div>` + list.map(a => {
    const playing = state.npAsset?.id === a.id;
    return `<div class="asset-card panel">
      <div class="hd">
        <button class="play" data-play="${a.id}" aria-label="Preview ${esc(a.title)}">${playing && Player.playing ? "❚❚" : "▶"}</button>
        <div class="grow">
          <div class="row-title" style="font-size:14.5px">${esc(a.title)} ${playing ? eq() : ""}</div>
          <div class="sub">${ROLES[a.role]} · ${mmss(a.dur)}${state.tab === "assets" ? " · " + esc(songOf(a)?.title || "") : ""}</div>
        </div>
      </div>
      <canvas class="wave" data-wave="${a.id}"></canvas>
      <div class="file mono">${esc(a.file)}</div>
    </div>`;
  }).join("");
}

function renderDNA(){
  return `<div class="empty" style="padding-top:70px">
    <div class="big">〰</div>
    <b>Creative DNA</b>
    Cross-song patterns in your catalog — recurring keys, tempos, structures, and sounds.<br><br>
    <span class="badge">Unlocks as observed history accumulates</span>
  </div>`;
}

function renderView(scroll=true){
  const v = $("#view");
  if (state.tab === "songs") v.innerHTML = state.songId ? renderSongView() : renderSongs();
  if (state.tab === "timeline") v.innerHTML = renderEvents([...state.events], true);
  if (state.tab === "assets") v.innerHTML = renderAssetCards([...state.assets].sort((a,b) => b.created - a.created));
  if (state.tab === "dna") v.innerHTML = renderDNA();
  $("#desk-list").innerHTML = `<div class="eyebrow">Catalog</div>` + state.songs.map(s => songCard(s, true)).join("");
  $("#back").classList.toggle("show", state.tab === "songs" && !!state.songId);
  document.querySelectorAll("nav#tabs button").forEach(b => b.classList.toggle("on", b.dataset.tab === state.tab));
  document.querySelectorAll("canvas[data-wave]").forEach(c => drawWave(c, byId(c.dataset.wave)));
  if (scroll) $("#main").scrollTo({ top:0 });
}

function renderNP(){
  const a = state.npAsset, bar = $("#np");
  bar.classList.toggle("show", !!a);
  $("#main").classList.toggle("has-np", !!a);
  if (!a) return;
  $("#np-title").textContent = a.title;
  $("#np-sub").textContent = (songOf(a)?.title || "") + " · generative preview";
  $("#np-dur").textContent = mmss(a.dur);
  $("#np-play").textContent = Player.playing ? "❚❚" : "▶";
}

/* ================= sheets ================= */
function openSheet(html){
  $("#sheet").innerHTML = `<div class="grab"></div>` + html;
  $("#sheet").classList.add("show"); $("#scrim").classList.add("show");
}
function closeSheet(){ $("#sheet").classList.remove("show"); $("#scrim").classList.remove("show"); }
$("#scrim").addEventListener("click", closeSheet);

function slotSheet(slotId){
  const s = song(), x = s.sections.find(z => z.id === slotId);
  const opts = assetsFor(s.id);
  openSheet(`
    <h3>${esc(x.name)}</h3>
    <div class="hint">${x.note ? esc(x.note) : "Assign a source and set its decision state."}</div>
    <div class="eyebrow">Assign asset</div>
    <button class="opt" data-assign="none" data-slot="${slotId}"><span class="dot"></span>None<span class="r">clear</span></button>
    ${opts.map(a => `<button class="opt" data-assign="${a.id}" data-slot="${slotId}">
      <span class="dot" style="--tint:${x.assetId===a.id?"var(--gold)":"var(--muted)"}"></span>${esc(a.title)}
      <span class="r">${ROLES[a.role]}</span></button>`).join("")}
    <div class="eyebrow" style="margin-top:14px">Set state</div>
    ${Object.entries(STATES).map(([k,v]) => `<button class="opt" data-state="${k}" data-slot="${slotId}">
      <span class="dot" style="--tint:${v.tint}"></span>${v.label}${x.state===k?`<span class="r">current</span>`:""}</button>`).join("")}
    ${opts.length > 1 ? `<div class="sheet-actions"><button class="btn gold" data-compare="${slotId}">Compare A/B</button></div>` : ""}
  `);
}

let ab = null;
function compareSheet(slotId){
  const s = song(), x = s.sections.find(z => z.id === slotId);
  const cands = assetsFor(s.id);
  if (!ab || ab.slot !== slotId){
    ab = { slot:slotId, a: x.assetId || cands[0].id, b: (cands.find(c => c.id !== (x.assetId || cands[0].id)) || cands[0]).id };
  }
  const A2 = byId(ab.a), B2 = byId(ab.b);
  const side = (lbl, asset, key, tint) => `
    <div class="ab ${state.npAsset?.id === asset.id ? "live" : ""}" style="--tint:${tint}">
      <div class="lbl">${lbl}</div>
      <select class="field" data-abpick="${key}">${cands.map(c =>
        `<option value="${c.id}" ${c.id===asset.id?"selected":""}>${esc(c.title)}</option>`).join("")}</select>
      <canvas class="wave" data-wave="${asset.id}"></canvas>
      <div class="fn mono">${esc(asset.file)}</div>
      <button class="btn" style="border-color:${tint};color:${tint}" data-ablisten="${key}">
        ${state.npAsset?.id === asset.id && Player.playing ? "❚❚ Pause" : "▶ Listen " + lbl}</button>
      <button class="btn ${key==="a"?"gold":"blue"}" data-abchoose="${key}">Choose ${lbl}</button>
    </div>`;
  openSheet(`
    <h3>Compare — ${esc(x.name)}</h3>
    <div class="hint">Switch sides without losing the playhead. Choosing locks the slot.</div>
    <div class="ab-grid">
      ${side("A", A2, "a", "var(--gold)")}
      ${side("B", B2, "b", "var(--blue)")}
    </div>
    <button class="btn ghost" style="width:100%" data-abclose>Keep undecided</button>
  `);
  document.querySelectorAll("#sheet canvas[data-wave]").forEach(c =>
    drawWave(c, byId(c.dataset.wave), c.closest(".ab").style.getPropertyValue("--tint").includes("blue") ? "#80A6FF" : "#D6AE5C"));
}

function logChangeSheet(){
  const s = song(); if (!s) return;
  openSheet(`
    <h3>Log change</h3>
    <div class="hint">${esc(s.title)} — a manual entry in the creative record.</div>
    <select class="field" id="lc-target">${TARGETS.map(t => `<option>${t}</option>`).join("")}</select>
    <select class="field" id="lc-op">${OPS.map(o => `<option>${o}</option>`).join("")}</select>
    <input class="field" id="lc-sum" placeholder="What changed?" maxlength="120">
    <div class="sheet-actions">
      <button class="btn ghost" data-abclose>Cancel</button>
      <button class="btn gold" id="lc-save">Log change</button>
    </div>`);
}

function addSlotSheet(){
  openSheet(`
    <h3>New master slot</h3>
    <div class="hint">Adds a structural slot to this song's composition.</div>
    <input class="field" id="ns-name" placeholder="Slot name (e.g. Verse 2)" maxlength="40">
    <div class="sheet-actions">
      <button class="btn ghost" data-abclose>Cancel</button>
      <button class="btn gold" id="ns-save">Add slot</button>
    </div>`);
}

/* ================= mutations ================= */
const targetFor = name => {
  const n = name.toLowerCase();
  if (n.includes("intro")) return "Intro";
  if (n.includes("verse")) return "Verse";
  if (n.includes("hook") || n.includes("chorus")) return "Hook";
  if (n.includes("bridge")) return "Bridge";
  return "Song";
};
function assign(slotId, assetId){
  const s = song(), x = s.sections.find(z => z.id === slotId);
  const before = x.assetId;
  x.assetId = assetId;
  if (assetId && x.state === "open"){ x.state = "candidate"; x.conf = Math.max(x.conf, .5); }
  const a = byId(assetId);
  record(s.id, targetFor(x.name), assetId ? "Source Selected" : "Structure Updated",
    assetId ? `${a.title} selected as ${x.name} source.` : `${x.name} source cleared.`);
  if (before !== assetId) toast(assetId ? `${a.title} → ${x.name}` : `${x.name} cleared`);
}
function setSlotState(slotId, k){
  const s = song(), x = s.sections.find(z => z.id === slotId);
  const old = x.state; if (old === k) return;
  x.state = k; if (k === "locked") x.conf = Math.max(x.conf, .9);
  const opMap = { locked:"Approved", needsDecision:"Needs Decision", candidate:"Candidate Added", experiment:"Structure Updated", open:"Structure Updated" };
  record(s.id, targetFor(x.name), opMap[k], `${x.name} moved from ${STATES[old].label} to ${STATES[k].label}.`);
}
const DROPS = [
  ["Hook Sunrise Take","hook sunrise take3.m4a","hook",39],
  ["Verse 2 Rough","verse2 rough vox.m4a","leadVocal",58],
  ["Beat Switch Idea","beat switch idea.m4a","beat",112],
  ["Golden Bounce v3","golden state bounce(3).wav","fullMix",214]
];
let dropIdx = 0;
function simulateDrop(){
  const [title, file, role, dur] = DROPS[dropIdx++ % DROPS.length];
  const a = mkAsset(S1.id, title + (dropIdx > 4 ? " " + dropIdx : ""), file, role, dur, 0);
  a.created = now2(); a.file = a.file;
  state.assets.push(a);
  record(S1.id, ROLES[role] === "Full Mix" ? "Mix" : ROLES[role], "Imported", `${a.file} appeared in watched folder (observed).`, true);
  toast("Observed: " + a.file);
  renderView(false);
}

/* ================= events wiring ================= */
document.addEventListener("click", e => {
  const t = e.target.closest("button,[data-slot]");
  if (!t) return;

  if (t.dataset.play){ e.stopPropagation(); Player.toggle(byId(t.dataset.play)); return; }
  if (t.dataset.song){ state.tab = "songs"; state.songId = t.dataset.song; state.songTab = "master"; renderView(); return; }
  if (t.dataset.tab){ state.tab = t.dataset.tab; renderView(); return; }
  if (t.dataset.songtab){ state.songTab = t.dataset.songtab; renderView(false); return; }
  if (t.id === "back"){ state.songId = null; renderView(); return; }
  if (t.id === "simulate-drop"){ simulateDrop(); return; }
  if (t.id === "add-slot"){ addSlotSheet(); return; }
  if (t.id === "log-change"){ logChangeSheet(); return; }

  if (t.dataset.compare){ compareSheet(t.dataset.compare); return; }
  if (t.dataset.assign !== undefined){
    assign(t.dataset.slot, t.dataset.assign === "none" ? null : t.dataset.assign);
    closeSheet(); renderView(false); return;
  }
  if (t.dataset.state){ setSlotState(t.dataset.slot, t.dataset.state); closeSheet(); renderView(false); return; }

  if (t.dataset.ablisten){
    const a = byId(ab[t.dataset.ablisten]);
    if (state.npAsset?.id === a.id){ Player.playing ? Player.pause() : Player.resume(); }
    else Player.switchTo(a);
    compareSheet(ab.slot); return;
  }
  if (t.dataset.abchoose){
    const winner = byId(ab[t.dataset.abchoose]);
    assign(ab.slot, winner.id); setSlotState(ab.slot, "locked");
    Player.stop(); ab = null; closeSheet(); renderView(false);
    toast(winner.title + " locked ✓"); return;
  }
  if (t.hasAttribute("data-abclose")){ closeSheet(); return; }

  if (t.id === "lc-save"){
    const sum = $("#lc-sum").value.trim();
    record(song().id, $("#lc-target").value, $("#lc-op").value, sum || "Manual entry.");
    closeSheet(); state.songTab = "changes"; renderView(false); toast("Change logged"); return;
  }
  if (t.id === "ns-save"){
    const name = $("#ns-name").value.trim(); if (!name) return;
    song().sections.push(sec(name, "Custom", null, "open", 0));
    record(song().id, "Song", "Structure Updated", `${name} slot added to master composition.`);
    closeSheet(); renderView(false); return;
  }

  const slotEl = e.target.closest("[data-slot]");
  if (slotEl && !e.target.closest("button")){ slotSheet(slotEl.dataset.slot); }
});

document.addEventListener("change", e => {
  if (e.target.dataset?.abpick){ ab[e.target.dataset.abpick] = e.target.value; compareSheet(ab.slot); }
});

$("#np-play").addEventListener("click", () => { Player.playing ? Player.pause() : Player.resume(); });
$("#np-stop").addEventListener("click", () => Player.stop());
function trackSeek(ev){
  const r = $("#np-track").getBoundingClientRect();
  const x = (ev.touches ? ev.touches[0].clientX : ev.clientX) - r.left;
  Player.seek(Math.max(0, Math.min(1, x/r.width)));
}
$("#np-track").addEventListener("pointerdown", trackSeek);

window.addEventListener("resize", () => document.querySelectorAll("canvas[data-wave]").forEach(c => drawWave(c, byId(c.dataset.wave))));

renderView();
renderNP();
</script>
