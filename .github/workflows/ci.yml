name: CI

on:
  push:
  pull_request:

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify prototype files
        run: |
          test -f app/static/index.html
          test -f app/static/styles.css
          test -f app/static/app.js
          test -f app/static/catalog.json
          grep -q "Artist OS" app/static/index.html
